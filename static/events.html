<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackMate — Discover Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap"
        rel="stylesheet" />
    <style>
        /* ─── THEME ENGINE ─── */
        :root {
            --bg: #3a3532;
            --bg2: #4e4844;
            --surface: #5e5751;
            --border: rgba(201, 160, 115, 0.25);
            --border-hi: rgba(201, 160, 115, 0.7);
            --text: #e6ded7;
            --text-muted: #b0a8a1;
            --accent: #c9a073;
        }

        [data-theme="light"] {
            --bg: #f4f1ed;
            --bg2: #e6e2de;
            --surface: #ffffff;
            --border: rgba(170, 130, 90, 0.2);
            --border-hi: rgba(170, 130, 90, 0.6);
            --text: #3a3532;
            --text-muted: #7a726d;
            --accent: #a67c52;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .mono {
            font-family: 'Share Tech Mono', monospace;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            position: relative;
        }

        .scan-input {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            width: 100%;
            outline: none;
        }

        .scan-btn {
            padding: 0.6rem 1.25rem;
            background: var(--accent);
            color: #042b1c;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
        }

        .filter-pill {
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
        }

        .filter-pill.active {
            border-color: var(--accent);
            background: rgba(201, 160, 115, 0.2);
            color: var(--accent);
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: var(--bg2);
            border: 1px solid var(--border);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header style="background: var(--bg2); border-bottom: 1px solid var(--border);" class="sticky top-0 z-50">
        <div class="max-w-6xl mx-auto h-16 px-6 flex items-center justify-between">
            <div class="logo font-bold tracking-wider text-xl mono cursor-pointer"
                onclick="window.location.href='/index.html'" style="color: var(--accent);">⌗ HACKMATE</div>
            <div class="flex items-center gap-4">
                <button id="navActionBtn" onclick="handleNavAction()" class="scan-btn text-xs mono"></button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-10">
        <div class="card mb-8 flex flex-col gap-6">
            <div class="flex flex-wrap gap-6 items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="mono text-xs text-[var(--text-muted)]">COST:</span>
                    <button id="costAll" class="filter-pill active" onclick="setCostFilter('ALL')">[ ALL ]</button>
                    <button id="costFree" class="filter-pill" onclick="setCostFilter('FREE')">[ FREE ]</button>
                    <button id="costPaid" class="filter-pill" onclick="setCostFilter('PAID')">[ PAID ]</button>
                </div>

                <div class="flex items-center gap-4 flex-1 max-w-xs">
                    <span class="mono text-xs text-[var(--text-muted)] whitespace-nowrap">RANGE:</span>
                    <input type="range" id="proximitySlider" min="5" max="200" value="100" class="w-full"
                        oninput="updateRangeLabel(this.value)" />
                    <span id="rangeLabel" class="mono text-xs text-[var(--accent)] whitespace-nowrap">100 KM</span>
                </div>

                <input type="text" id="citySearchInput" class="scan-input max-w-sm"
                    placeholder="Manual location fallback (e.g. Hyderabad)..." oninput="applyFiltering()" />
            </div>

            <div class="border-t border-[var(--border)] pt-4 flex flex-wrap items-center gap-2">
                <span class="mono text-xs text-[var(--text-muted)] mr-2">TRACK CHANNELS:</span>
                <button class="filter-pill active tracking-pill" onclick="toggleTrackFilter('All', this)">[ All Tracks
                    ]</button>
                <button class="filter-pill tracking-pill" onclick="toggleTrackFilter('Web3', this)">Web3</button>
                <button class="filter-pill tracking-pill" onclick="toggleTrackFilter('AI/ML', this)">AI/ML</button>
                <button class="filter-pill tracking-pill" onclick="toggleTrackFilter('Fintech', this)">Fintech</button>
                <button class="filter-pill tracking-pill" onclick="toggleTrackFilter('UI/UX', this)">UI/UX</button>
            </div>
        </div>

        <div id="filterEmptyCatch" class="card text-center py-12 hidden">
            <p class="mono text-[var(--accent)] mb-4">⚠️ NO MISSIONS DETECTED MATCHING CURRENT COORDINATE PARAMETERS</p>
            <button class="scan-btn text-xs mx-auto" onclick="resetAdvancedFilterMatrix()">[ ⚡ RESET FILTERS ]</button>
        </div>

        <div id="publicEventFeedGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <div id="secureInterceptModal"
        style="position: fixed; inset: 0; background: rgba(5, 20, 14, 0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div class="card w-full max-w-md text-center p-8 border border-[var(--accent)]">
            <h2 class="mono font-bold text-lg mb-4 text-[var(--accent)]">Authentication Required</h2>
            <p class="text-xs mb-6 text-[var(--text-muted)]">To register for this event, you must secure a hacker
                profile first.</p>
            <div class="flex gap-4">
                <button class="scan-btn flex-1 text-xs" onclick="window.location.href='/login.html'">[ 🔑 LOGIN
                    ]</button>
                <button class="scan-btn !bg-transparent border text-xs"
                    onclick="document.getElementById('secureInterceptModal').style.display='none'">[ ❌ CANCEL ]</button>
            </div>
        </div>
    </div>

    <script>
        let globalActiveMissions = [];
        let selectedCostFilter = 'ALL';
        let selectedTracks = new Set(['All']);
        let isAuthenticatedHacker = !!localStorage.getItem('currentUser');

        window.onload = async () => {
            document.getElementById('navActionBtn').textContent = isAuthenticatedHacker ? '⌗ MY DASHBOARD' : '🔑 LOGIN';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { console.log("Atmospheric coordinates locked."); },
                    (err) => { console.warn("Location tracking denied. Reverting to manual entry framework."); }
                );
            }

            try {
                const res = await fetch('/api/admin/missions/all');
                globalActiveMissions = await res.json();
                applyFiltering();
            } catch (err) { console.error("Sync failed:", err); }
        };

        function handleNavAction() {
            if (isAuthenticatedHacker) {
                window.location.href = '/index.html';
            } else {
                window.location.href = '/login.html';
            }
        }

        function updateRangeLabel(val) {
            document.getElementById('rangeLabel').textContent = `${val} KM`;
            applyFiltering();
        }

        function setCostFilter(mode) {
            selectedCostFilter = mode;
            document.querySelectorAll('#costAll, #costFree, #costPaid').forEach(p => p.classList.remove('active'));
            if (mode === 'ALL') document.getElementById('costAll').classList.add('active');
            if (mode === 'FREE') document.getElementById('costFree').classList.add('active');
            if (mode === 'PAID') document.getElementById('costPaid').classList.add('active');
            applyFiltering();
        }

        function toggleTrackFilter(track, element) {
            if (track === 'All') {
                selectedTracks.clear();
                selectedTracks.add('All');
                document.querySelectorAll('.tracking-pill').forEach(p => p.classList.remove('active'));
                element.classList.add('active');
            } else {
                selectedTracks.delete('All');
                document.querySelectorAll('.tracking-pill')[0].classList.remove('active');

                if (selectedTracks.has(track)) {
                    selectedTracks.delete(track);
                    element.classList.remove('active');
                } else {
                    selectedTracks.add(track);
                    element.classList.add('active');
                }

                if (selectedTracks.size === 0) {
                    selectedTracks.add('All');
                    document.querySelectorAll('.tracking-pill')[0].classList.add('active');
                }
            }
            applyFiltering();
        }

        function applyFiltering() {
            const cityQuery = document.getElementById('citySearchInput').value.toLowerCase();
            const grid = document.getElementById('publicEventFeedGrid');
            const emptyCatch = document.getElementById('filterEmptyCatch');
            grid.innerHTML = '';

            const filtered = globalActiveMissions.filter(m => {
                const costMatch = selectedCostFilter === 'ALL' || (selectedCostFilter === 'FREE' ? !m.is_paid : m.is_paid);
                const cityMatch = m.location_name.toLowerCase().includes(cityQuery);

                let trackMatch = selectedTracks.has('All');
                if (!trackMatch && m.tracks) {
                    trackMatch = m.tracks.some(t => selectedTracks.has(t));
                } else if (!trackMatch) {
                    trackMatch = true;
                }

                return costMatch && cityMatch && trackMatch;
            });

            if (filtered.length === 0) {
                emptyCatch.classList.remove('hidden');
                grid.classList.add('hidden');
            } else {
                emptyCatch.classList.add('hidden');
                grid.classList.remove('hidden');

                filtered.forEach(mission => {
                    // Note: mapping backend schema '_id' value safely into the action check wrapper 
                    const uniqueId = mission._id || mission.id;
                    const card = document.createElement('div');
                    card.className = 'card flex flex-col justify-between';
                    card.innerHTML = `
            <div>
              <h3 class="mono font-bold text-md text-[var(--accent)] mb-2">${mission.title}</h3>
              <p class="text-xs text-[var(--text-muted)] mb-4">${mission.description}</p>
              <div class="flex gap-2 mb-4 flex-wrap">
                <span class="mono text-[10px] bg-[var(--bg2)] px-2 py-0.5 rounded border border-[var(--border)] text-[var(--text-muted)]">${mission.location_name}</span>
                <span class="mono text-[10px] bg-[var(--bg2)] px-2 py-0.5 rounded border border-[var(--border)] text-[var(--accent)]">${mission.is_paid ? 'PAID' : 'FREE'}</span>
              </div>
            </div>
            <button onclick="checkAuth('${mission.registration_link}', '${uniqueId}')" class="scan-btn w-full text-xs uppercase">[ Register ]</button>
          `;
                    grid.appendChild(card);
                });
            }
        }

        function resetAdvancedFilterMatrix() {
            document.getElementById('citySearchInput').value = '';
            setCostFilter('ALL');
            toggleTrackFilter('All', document.querySelectorAll('.tracking-pill')[0]);
        }

        async function checkAuth(url, hackathonId) {
            if (!isAuthenticatedHacker) {
                document.getElementById('secureInterceptModal').style.display = 'flex';
                return;
            }

            const userCached = localStorage.getItem('currentUser');
            if (!userCached) return;
            const currentUser = JSON.parse(userCached);

            try {
                // UPDATED: Fixed key configuration mapper parameter to pass 'eventId' instead of old 'hackathonId'
                const response = await fetch('/api/hacker/register-event', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUser.user_name,
                        hackathonId: hackathonId
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("⚡ Mission status updated! Event successfully mapped to your active dashboard.");
                    window.open(url, '_blank');
                    window.location.href = '/index.html'; // Relocate tracking target to display countdown live
                } else {
                    // Check for structural confirmation variations if the target is already active 
                    if (data.detail && (data.detail.includes("already") || data.detail.includes("locked"))) {
                        window.open(url, '_blank');
                        window.location.href = '/index.html';
                    } else {
                        alert(`Registration Sync Error: ${data.detail || 'Data stream anomaly detected'}`);
                    }
                }
            } catch (err) {
                console.error("Telemetry link dropout:", err);
                alert("Failed communicating event registration with data core.");
            }
        }
    </script>
</body>

</html>
